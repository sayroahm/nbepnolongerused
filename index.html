<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>nbep-us.com — No longer active</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', sans-serif;
      background: #fff;
      color: #0d0d0d;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      padding: 16px 28px;
    }

    .nav-brand {
      font-size: 1.25rem;
      font-weight: 700;
      color: #000;
      text-decoration: none;
      letter-spacing: -0.3px;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      gap: 72px;
    }

    .illustration {
      flex-shrink: 0;
      width: 340px;
    }

    .illustration img {
      width: 100%;
      display: block;
    }

    .content {
      max-width: 420px;
    }

    h1 {
      font-size: 1.875rem;
      font-weight: 400;
      color: #0d0d0d;
      line-height: 1.3;
      margin-bottom: 16px;
    }

    p {
      font-size: 0.9375rem;
      color: #606060;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .cta-btn {
      display: inline-block;
      background: #000;
      color: #fff;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 10px 22px;
      border-radius: 4px;
    }

    footer {
      padding: 20px 28px;
      font-size: 0.78rem;
      color: #909090;
    }

    @media (max-width: 680px) {
      main { flex-direction: column; gap: 32px; text-align: center; }
      .illustration { width: 220px; }
      .cta-btn { display: block; text-align: center; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="https://cortlin.us" class="nav-brand">Cortlin</a>
  </nav>

  <main>
    <div class="illustration">
      <img src="https://i.imgur.com/SRuWQw0.png" alt="Cortlin illustration" />
    </div>

    <div class="content">
      <h1>This site is no longer in use</h1>
      <p>nbep-us.com has been retired. You can find everything you're looking for over at cortlin.us.</p>
      <a href="https://cortlin.us" class="cta-btn">Go to Cortlin</a>
    </div>
  </main>

  <footer>
    This domain is managed by Cortlin &nbsp;·&nbsp; nbep-us.com is no longer active
  </footer>

</body>
</html>
